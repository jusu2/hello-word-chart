# -- Image configuration
image:
  repository: oci://xxxxx/hello-world
  tag: latest
  pullPolicy: IfNotPresent

# -- Number of replicas
replicaCount: 1

# -- Registry credentials (create ecr-regcred secret + imagePullSecrets)
registryCredentials:
  enabled: false
  registry: xxxxx.dkr.ecr.us-east-1.amazonaws.com
  username: AWS
  password: ""

# -- Service configuration
service:
  port: 80
  targetPort: 8080
  type: ClusterIP

# -- Ingress configuration
ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: nginx
  host: hello-world.example.com
  path: /
  pathType: Prefix

# -- HorizontalPodAutoscaler configuration
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# -- PostgreSQL configuration
postgresql:
  host: postgresql.example.com
  port: "5432"
  database: hello_world
  user: hello_world
  password: ""

# -- Resource limits & requests
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi